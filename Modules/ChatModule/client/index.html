<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLMOD Chat Module</title>
    <link rel="stylesheet" href="../../shared-styles.css">
    <style>
        .chat-messages {
            height: calc(100% - 80px);
            overflow-y: auto;
            padding: 15px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
            animation: messageSlide 0.3s ease-out;
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            background: linear-gradient(135deg, var(--rust-primary) 0%, var(--rust-dark) 100%);
            color: var(--text-primary);
            margin-left: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .message.assistant {
            background: rgba(47, 79, 79, 0.8);
            color: var(--text-primary);
            border: 1px solid var(--metal-silver);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: rgba(26, 35, 50, 0.9);
            border-top: 1px solid var(--rust-primary);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
        }
        
        .status-bar {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            padding: 8px 15px;
            background: rgba(26, 35, 50, 0.8);
            border-bottom: 1px solid var(--glass-border);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .status-text {
            display: flex;
            align-items: center;
        }
        
        .chat-container {
            height: 100%;
            position: relative;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="overlay-container">
        <div class="metal-frame">
            <div class="module-header">
                <h1 class="module-title">Chat Module</h1>
            </div>
            <div class="status-bar">
                <div class="status-text">
                    <span class="status-indicator status-offline" id="statusIndicator"></span>
                    <span id="statusText">Disconnected</span>
                </div>
                <span id="connectionTime">--:--</span>
            </div>
            <div class="module-content">
                <div class="chat-container">
                    <div class="chat-messages" id="chatContainer">
                        <div class="message assistant">Welcome to the Chat Module. Type your message below to start chatting with the assistant.</div>
                    </div>
                    <div class="input-container">
                        <div class="input-group">
                            <input type="text" id="messageInput" class="metal-input message-input" placeholder="Type your message here...">
                            <button class="rust-button" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let connectionStartTime = null;
        let connectionTimeInterval = null;
        
        function updateConnectionTime() {
            if (connectionStartTime) {
                const elapsed = Date.now() - connectionStartTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('connectionTime').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8080');
            
            ws.onopen = function() {
                connectionStartTime = Date.now();
                document.getElementById('statusText').textContent = 'Connected';
                document.getElementById('statusIndicator').className = 'status-indicator status-online';
                connectionTimeInterval = setInterval(updateConnectionTime, 1000);
            };
            
            ws.onmessage = function(event) {
                const message = JSON.parse(event.data);
                if (message.type === 'chat') {
                    addMessage(message.data.message, 'assistant');
                }
            };
            
            ws.onclose = function() {
                document.getElementById('statusText').textContent = 'Disconnected';
                document.getElementById('statusIndicator').className = 'status-indicator status-offline';
                document.getElementById('connectionTime').textContent = '--:--';
                connectionStartTime = null;
                if (connectionTimeInterval) {
                    clearInterval(connectionTimeInterval);
                    connectionTimeInterval = null;
                }
                // Attempt to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }
        
        function addMessage(text, sender) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                addMessage(message, 'user');
                ws.send(JSON.stringify({
                    type: 'chat',
                    data: { message: message }
                }));
                input.value = '';
            }
        }
        
        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Connect when page loads
        connectWebSocket();
    </script>
</body>
</html>
